<!DOCTYPE html>
<html lang="en">
  
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What Music Genre Am I?</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="container d-flex justify-content-center">
      <div class="card my-4 p-4" style="width: 75%;">
        
        <h1 class="mb-3" id="page-title">What Music Genre Are You?</h1>
        <p id="quiz-instructions">Answer all 4 questions, then click the button to see your results!</p>
        
        <!-- Start quiz element -->
        <div class="question-block">
          <p class="question-text">Q1: What's your perfect Friday night?</p>
          <div class="row g-2">
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="1">
                Stay in and watch a  movie
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="2">
                Go party with friends
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="3">
                Explore a new part of town
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="4">
                Read or listen to music alone
              </button>
            </div>
          </div>
        </div>
        <!-- End quiz element -->

        <!-- Start quiz element -->
        <div class="question-block">
          <p class="question-text">Q2: Pick your vibe:</p>
          <div class="row g-2">
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q2" data-answer="1">
                Funny and excited
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q2" data-answer="2">
                Bold and confident
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q2" data-answer="3">
                Chillllllll
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q2" data-answer="4">
                Deep and relaxed
              </button>
            </div>
          </div>
        </div>
        <!-- End quiz element -->

        <!-- Start quiz element -->
        <div class="question-block my-3">
          <p class="question-text">Q3: Your friends would describe you as:</p>
          <div class="row g-2">
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q3" data-answer="1">
                Fun and bubbly
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q3" data-answer="2">
                Cool and with the kids
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q3" data-answer="3">
                Creative and unique
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q3" data-answer="4">
                Calm and wise
              </button>
            </div>
          </div>
        </div>
        <!-- End quiz element -->
 
        <!-- Start quiz element -->
        <div class="question-block my-3">
          <p class="question-text">Q4: What do you do when you're stressed?</p>
          <div class="row g-2">
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q4" data-answer="1">
                Call a friend and talk about it
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q4" data-answer="2">
                Put on headphones and sit in your room
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q4" data-answer="3">
                Go for a walk
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q4" data-answer="4">
                Journal 
              </button>
            </div>
          </div>
        </div>
        <!-- End quiz element -->

         <button class="btn btn-success mt-4" id="results-btn">Give Me the Results!</button>
 
        <div id="result-container" class="mt-3"></div>
 
      </div>
    </div>

    <!-- Connectted my java file here -->
    <script src = "js/script.js"></script>
    
  </body>
</html>
