<!DOCTYPE html>
<html lang="en">
  
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What Music Genre Am I?</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="container d-flex justify-content-center">
      <div class="card my-4 p-4" style="width: 75%;">
        
        <h1 class="mb-3" id="page-title">What Music Genre Are You?</h1>
        <p id="quiz-instructions">Answer all 4 questions, then click the button to see your results!</p>
        
        <!-- Start quiz element -->
        <div class="question-block">
          <p class="question-text">Q1: What's your perfect Friday night?</p>
          <div class="row g-2">
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="1">
                Stay in and watch a  movie
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="2">
                Go party with friends
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="3">
                Explore a new part of town
              </button>
            </div>
            <div class="col-6">
              <button class="btn btn-outline-primary w-100 answer-btn" data-questionid="q1" data-answer="4">
                Read or listen to music alone
              </button>
            </div>
          </div>
        </div>
        <!-- End quiz element -->


    <!-- Connectted my java file here -->
    <script src = "script.js"></script>
    
  </body>
</html>
